<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HorrorMovie Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; }
    .muted { color:#666; }

    table { border-collapse: collapse; width: 100%; }
    th, td {
      border:1px solid #e5e5e5;
      padding:8px;
      font-size: 13px;
      vertical-align: top;
      overflow-wrap:anywhere;
      white-space: pre-wrap;
    }

    thead th{
      position: sticky;
      z-index: 2;
      background: #2f3b52;
      color: #fff;
      font-weight: 800;
    }

    thead tr.head-row th {
      top: 0;
    }

    thead tr.filter-row th {
      top: 37px;
      background: #e9eef7;
      color: #111;
      font-weight: 600;
    }

    thead input.filter-input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 7px;
      border: 1px solid #c9d2e3;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      color: #111;
    }

    tbody tr:nth-child(even){ background:#f6f8fb; }
    tbody tr:nth-child(odd){ background:#ffffff; }

    tbody tr.first-row {
      background: #fff3cd !important;
      outline: 2px solid #ffe69c;
      outline-offset: -2px;
    }

    a { color: #1155cc; text-decoration: underline; font-weight: 800; }

    td.rating { font-weight: 900; text-align:center; }
    td.rating-pessimo     { background:#8b0000 !important; color:#fff !important; }
    td.rating-mediocre    { background:#c0392b !important; color:#fff !important; }
    td.rating-medio       { background:#f39c12 !important; color:#111 !important; }
    td.rating-buono       { background:#f1c40f !important; color:#111 !important; }
    td.rating-ottimo      { background:#2ecc71 !important; color:#111 !important; }
    td.rating-capolavoro  { background:#1abc9c !important; color:#111 !important; }

    td.col-url {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
    }

    .toolbar {
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin: 8px 0 10px;
    }

    button {
      padding: 7px 10px;
      border: 0;
      border-radius: 8px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="muted">Viewer read-only (ultime righe) — tab <b>HorrorMovie</b></div>
  <div class="toolbar">
    <button id="clearFiltersBtn" type="button">Clear filters</button>
    <span id="status" class="muted">Caricamento…</span>
  </div>
  <div id="tbl"></div>

<script>
  const qs = new URLSearchParams(location.search);
  const WEB_APP_URL = qs.get("webApp");
  const LIMIT = qs.get("limit") || "50";

  let headersGlobal = [];
  let rowsGlobal = [];

  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const cbName = "cb_" + Math.random().toString(36).slice(2);
      const script = document.createElement("script");

      const t = setTimeout(() => {
        cleanup();
        reject(new Error("Timeout JSONP"));
      }, 15000);

      function cleanup() {
        clearTimeout(t);
        try { delete window[cbName]; } catch (_) { window[cbName] = undefined; }
        script.remove();
      }

      window[cbName] = (data) => {
        cleanup();
        resolve(data);
      };

      const u = new URL(url);
      u.searchParams.set("cb", cbName);
      u.searchParams.set("_", Date.now().toString());

      script.src = u.toString();
      script.onerror = () => {
        cleanup();
        reject(new Error("JSONP load error"));
      };

      document.body.appendChild(script);
    });
  }

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => (
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));
  }

  function normHeader_(h) {
    return String(h ?? "").trim().toLowerCase().replace(/\s+/g, " ");
  }

  function findCol_(headers, keyword) {
    const key = String(keyword).toLowerCase();
    for (let i = 0; i < headers.length; i++) {
      const nh = normHeader_(headers[i]);
      if (nh === key) return i;
      if (nh.includes(key)) return i;
    }
    return -1;
  }

  function uniqueValues_(rows, colIndex) {
  const set = new Set();
  rows.forEach(r => {
    const v = String(r[colIndex] ?? "").trim();
    if (v) set.add(v);
  });
  return Array.from(set).sort((a, b) => {
    // numerico se possibile (per year)
    const na = Number(a), nb = Number(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
}

  function ratingClass_(val) {
    const v = String(val ?? "").trim().toLowerCase();
    if (!v) return "";
    if (v === "pessimo") return "rating-pessimo";
    if (v === "mediocre") return "rating-mediocre";
    if (v === "medio") return "rating-medio";
    if (v === "buono") return "rating-buono";
    if (v === "ottimo") return "rating-ottimo";
    if (v === "capolavoro") return "rating-capolavoro";
    return "";
  }

  function getFilters_() {
    const inputs = document.querySelectorAll(".filter-input");
    const filters = {};
    inputs.forEach(inp => {
      const idx = Number(inp.dataset.colIndex);
      filters[idx] = inp.value.trim().toLowerCase();
    });
    return filters;
  }

  function rowMatchesFilters_(row, filters) {
    for (const [idxStr, filterVal] of Object.entries(filters)) {
      if (!filterVal) continue;
      const idx = Number(idxStr);
      const cellVal = String(row[idx] ?? "").trim().toLowerCase();
      if (!cellVal.includes(filterVal)) return false;
    }
    return true;
  }

  function buildFilterRow_(headers, rows) {
  const idxYear   = findCol_(headers, "year");
  const idxTitle  = findCol_(headers, "title");
  const idxNation = findCol_(headers, "nation");

  const yearVals   = idxYear   >= 0 ? uniqueValues_(rows, idxYear)   : [];
  const titleVals  = idxTitle  >= 0 ? uniqueValues_(rows, idxTitle)  : [];
  const nationVals = idxNation >= 0 ? uniqueValues_(rows, idxNation) : [];

  let html = '<tr class="filter-row">';

  for (let i = 0; i < headers.length; i++) {

    // YEAR dropdown
    if (i === idxYear) {
      html += `
        <th>
          <select class="filter-select" data-col-index="${i}">
            <option value="">all years</option>
            ${yearVals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("")}
          </select>
        </th>
      `;
      continue;
    }

    // TITLE dropdown
    if (i === idxTitle) {
      html += `
        <th>
          <select class="filter-select" data-col-index="${i}">
            <option value="">all titles</option>
            ${titleVals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("")}
          </select>
        </th>
      `;
      continue;
    }

    // NATION dropdown
    if (i === idxNation) {
      html += `
        <th>
          <select class="filter-select" data-col-index="${i}">
            <option value="">all nations</option>
            ${nationVals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("")}
          </select>
        </th>
      `;
      continue;
    }

    // default input
    html += `
      <th>
        <input
          class="filter-input"
          type="text"
          data-col-index="${i}"
          placeholder="filter ${esc(headers[i])}"
        />
      </th>
    `;
  }

  html += "</tr>";
  return html;
}

  function renderTable(rows) {
    const tbl = document.getElementById("tbl");
    const status = document.getElementById("status");

    const headers = headersGlobal;
    const idxTitle  = findCol_(headers, "title");
    const idxLink   = findCol_(headers, "link");
    const idxUrl    = findCol_(headers, "url");
    const idxRating = findCol_(headers, "rating");

    let html = '<table><thead>';
    html += '<tr class="head-row">';
    for (const h of headers) html += `<th>${esc(h)}</th>`;
    html += "</tr>";
    html += buildFilterRow_(headers);
    html += "</thead><tbody>";

    for (let rI = 0; rI < rows.length; rI++) {
      const r = rows[rI];

      let url = (idxUrl >= 0) ? String(r[idxUrl] ?? "").trim() : "";
      if (/^www\./i.test(url)) {
        url = "https://" + url;
      }
      const urlOk = /^https?:\/\//i.test(url);

      const trClass = (rI === 0) ? "first-row" : "";
      html += `<tr class="${trClass}">`;

      for (let c = 0; c < headers.length; c++) {
        const cellVal = r[c];
        let content = esc(cellVal);

        if (c === idxTitle && urlOk) {
          const text = String(cellVal ?? "").trim() || "open";
          content = `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(text)}</a>`;
        }

        if (c === idxLink && urlOk) {
          const text = String(cellVal ?? "").trim() || "open";
          content = `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(text)}</a>`;
        }

        let cls = "";
        if (c === idxRating) cls = `rating ${ratingClass_(cellVal)}`;
        if (c === idxUrl) cls = (cls ? cls + " " : "") + "col-url";

        html += `<td class="${cls}">${content}</td>`;
      }

      html += "</tr>";
    }

    html += "</tbody></table>";
    tbl.innerHTML = html;

    document.querySelectorAll(".filter-input").forEach(inp => {
      inp.addEventListener("input", applyFilters);
    });

    status.textContent = `Rows shown: ${rows.length} / ${rowsGlobal.length}`;
  }

  function applyFilters() {
    const filters = getFilters_();
    const filtered = rowsGlobal.filter(row => rowMatchesFilters_(row, filters));
    renderTable(filtered);

    // ripristina i valori dei filtri dopo il re-render
    document.querySelectorAll(".filter-input").forEach(inp => {
      const idx = Number(inp.dataset.colIndex);
      inp.value = filters[idx] || "";
    });
  }

  async function load() {
    const status = document.getElementById("status");

    if (!WEB_APP_URL) {
      status.textContent = "Errore: manca parametro 'webApp' nell'URL.";
      return;
    }

    try {
      const u = new URL(WEB_APP_URL);
      u.searchParams.set("mode", "view");
      u.searchParams.set("limit", LIMIT);

      const resp = await jsonp(u.toString());
      if (!resp || resp.ok !== true) {
        status.textContent = "Errore: " + (resp?.error || "risposta non valida");
        return;
      }

      headersGlobal = resp.headers || [];
      rowsGlobal = (resp.rows || []).slice().reverse();

      renderTable(rowsGlobal);

    } catch (e) {
      status.textContent = "Errore: " + e.message;
    }
  }

  document.getElementById("clearFiltersBtn").addEventListener("click", () => {
    renderTable(rowsGlobal);
  });

  load();
</script>

</body>
</html>
